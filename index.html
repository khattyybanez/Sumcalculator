<body>
    <div class="container">
        <h1>JavaScript Calculator</h1>
        <div class="input-box">
             <label>Input First Number</label>
             <input type="text" id="num1"/>
        </div>
    
        <div class="input-box"> 
            <label>Input Second Number</label> 
            <input type="text" id="num2"/>

        <div class="btn">
            <button onclick="jsCalc()">Calculate</button>
        |   <button onclick="clearEntries()">Clear</button>
        </div>

        <p id="answer">Answer goes here...</p>
    </div>   
    <script src="js/scripts.js"></script>
